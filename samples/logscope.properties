# LogScope CLI configuration
log.level=info
log.timestamps=true

# Format profile (optional): generic-plain, generic-json
# profile=generic-json

# Source format override (optional): auto, plain, jsonl
# source.format=auto

# JSON field mapping overrides (optional)
# source.json.timestamp_field=@timestamp
# source.json.level_field=severity

# Investigation index size (optional, default 10000)
# investigation.max_indexed_lines=10000

# Saved searches (optional)
# search.saved.errors=error OR warning
# search.saved.timeouts=timeout AND error

# Saved filter queries (optional)
# query.saved.errors=level == ERROR
# query.saved.refused=contains(message, "refused")

# report.format=text
# report.sections=all
# report.include_charts=true
# report.include_timeline=true
# report.template=default

# Analytics (optional)
# analytics.bucket_seconds=60
# analytics.top_n=10
# analytics.min_cluster_count=2
# extensions.reporting.multi-format.enabled=true

# Storage index (optional)
# storage.mode=memory
# storage.index.directory=~/.logscope/indexes
# storage.index.path=
# storage.spill_threshold=

# Storage v1.4.3 (planned — see M11-V143-STORAGE-SCENARIOS.md)
# storage.compress_content=false
# storage.compress_threshold_bytes=256
# storage.query_cache.enabled=true
# storage.query_cache.max_entries=64
# storage.incremental_append=true
