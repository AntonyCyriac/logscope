name: Continuous Integration

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build and Test (${{ matrix.os }})

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Configure CMake (Windows)
        if: matrix.os == 'windows-latest'
        env:
          CMAKE_TLS_VERIFY: '0'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Unix)
        if: matrix.os != 'windows-latest'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run Tests
        run: ctest --test-dir build --output-on-failure --build-config Release

  cli-matrix:
    name: CLI Matrix (Ubuntu)

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Generate Bulk Logs
        run: |
          python3 scripts/generate_bulk_log.py --lines 10000 --format plain --output /tmp/bulk.log
          python3 scripts/generate_bulk_log.py --lines 10000 --format jsonl --output /tmp/bulk.jsonl

      - name: Run CLI Matrix
        run: |
          python3 scripts/run_cli_matrix.py \
            --logscope build/apps/cli/logscope \
            --plain-log /tmp/bulk.log \
            --jsonl-log /tmp/bulk.jsonl

  sanitize:
    name: Sanitizer Build (Ubuntu)

    runs-on: ubuntu-latest

    env:
      ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1
      UBSAN_OPTIONS: print_stacktrace=1

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DLOGSCOPE_SANITIZE=ON

      - name: Build
        run: cmake --build build

      - name: Run Tests
        run: ctest --test-dir build --output-on-failure

  coverage:
    name: Code Coverage (Ubuntu)

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Configure CMake
        run: |
          cmake -S . -B build \
                -DCMAKE_BUILD_TYPE=Debug \
                -DCMAKE_CXX_FLAGS="--coverage -fprofile-update=atomic" \
                -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build
        run: cmake --build build -j 2

      - name: Run Tests
        run: ctest --test-dir build --output-on-failure

      - name: Generate Coverage Report
        run: |
          lcov --capture --directory build --output-file coverage.info \
            --rc geninfo_unexecuted_blocks=1 \
            --ignore-errors mismatch,inconsistent,gcov,negative,unused \
            --quiet
          lcov --remove coverage.info '/usr/*' '*/_deps/*' '*/tests/*' \
            --output-file coverage.info \
            --ignore-errors unused \
            --quiet
          lcov --list coverage.info

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage.info

  benchmark:
    name: Performance Benchmarks (Ubuntu)

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DLOGSCOPE_BENCHMARKS=ON

      - name: Build Benchmarks
        run: cmake --build build --target logscope_benchmarks

      - name: Run Benchmarks
        run: ./build/tests/benchmarks/logscope_benchmarks --benchmark_format=json --benchmark_out=benchmark_results.json

      - name: Check Regression
        run: python3 scripts/check_benchmark_regression.py tests/benchmarks/baseline.json benchmark_results.json

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-results
          path: benchmark_results.json

  docs:
    name: API Documentation (Ubuntu)

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Configure CMake
        run: cmake -S . -B build -DLOGSCOPE_DOCS=ON

      - name: Build API Documentation
        run: cmake --build build --target docs

      - name: Upload API Documentation
        uses: actions/upload-artifact@v6
        with:
          name: api-docs
          path: build/docs/api/html

  fuzz:
    name: Fuzz Targets (Ubuntu Clang)

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Install Clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Configure CMake
        run: |
          cmake -S . -B build \
                -DCMAKE_BUILD_TYPE=Debug \
                -DCMAKE_C_COMPILER=clang \
                -DCMAKE_CXX_COMPILER=clang++ \
                -DLOGSCOPE_FUZZING=ON

      - name: Build Fuzz Targets
        run: cmake --build build --target session_serializer_fuzz configuration_fuzz

      - name: Run Fuzz Smoke Test
        run: |
          ./build/tests/fuzz/session_serializer_fuzz -runs=1000
          ./build/tests/fuzz/configuration_fuzz -runs=1000

  tidy:
    name: Static Analysis (clang-tidy)

    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: cmake --build build --target tidy
