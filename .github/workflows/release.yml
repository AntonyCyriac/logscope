name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.artifact_name }})

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: logscope-linux-amd64
            binary_path: build/apps/cli/logscope
            archive_file: logscope-linux-amd64.tar.gz
          - os: windows-latest
            artifact_name: logscope-windows-amd64
            binary_path: build/apps/cli/Release/logscope.exe
            archive_file: logscope-windows-amd64.zip
          - os: macos-latest
            artifact_name: logscope-macos-amd64
            binary_path: build/apps/cli/logscope
            archive_file: logscope-macos-amd64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Configure CMake (Windows)
        if: matrix.os == 'windows-latest'
        env:
          CMAKE_TLS_VERIFY: '0'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Unix)
        if: matrix.os != 'windows-latest'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run Tests
        run: ctest --test-dir build --output-on-failure --build-config Release

      - name: Package Binary
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.binary_path }}" dist/
          cp -r samples dist/

      - name: Create Archive (Unix)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.archive_file }} -C dist .

      - name: Create Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/* -DestinationPath ${{ matrix.archive_file }}

      - name: CLI Matrix Smoke Test
        shell: bash
        env:
          # Release-only: 100k stress matrix (CI cli-matrix stays at 10k).
          BULK_LOG_LINES: 100000
        run: |
          python3 scripts/generate_bulk_log.py --lines "${BULK_LOG_LINES}" --format plain --output /tmp/bulk.log
          python3 scripts/generate_bulk_log.py --lines "${BULK_LOG_LINES}" --format jsonl --output /tmp/bulk.jsonl

          if [ "${{ runner.os }}" = "Windows" ]; then
            LOGSCOPE=./build/apps/cli/Release/logscope.exe
          else
            LOGSCOPE=./build/apps/cli/logscope
          fi

          python3 scripts/run_cli_matrix.py \
            --logscope "${LOGSCOPE}" \
            --plain-log /tmp/bulk.log \
            --jsonl-log /tmp/bulk.jsonl

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_file }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
