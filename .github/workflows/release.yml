name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.artifact_name }})

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: logscope-linux-amd64
            binary_path: build/apps/cli/logscope
            archive_cmd: tar -czf ${{ matrix.artifact_name }}.tar.gz -C dist .
            archive_file: logscope-linux-amd64.tar.gz
          - os: windows-latest
            artifact_name: logscope-windows-amd64
            binary_path: build/apps/cli/Release/logscope.exe
            archive_cmd: powershell Compress-Archive -Path dist/* -DestinationPath logscope-windows-amd64.zip
            archive_file: logscope-windows-amd64.zip
          - os: macos-latest
            artifact_name: logscope-macos-amd64
            binary_path: build/apps/cli/logscope
            archive_cmd: tar -czf ${{ matrix.artifact_name }}.tar.gz -C dist .
            archive_file: logscope-macos-amd64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run Tests
        run: ctest --test-dir build --output-on-failure --build-config Release

      - name: Package Binary
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.binary_path }}" dist/
          cp -r samples dist/

      - name: Create Archive (Unix)
        if: runner.os != 'Windows'
        run: ${{ matrix.archive_cmd }}

      - name: Create Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ${{ matrix.archive_cmd }}

      - name: Smoke Test
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./build/apps/cli/Release/logscope.exe analyze samples/sample.log
          else
            ./build/apps/cli/logscope analyze samples/sample.log
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_file }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
